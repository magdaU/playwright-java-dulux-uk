name: E2E Tests

on:
  push:
    branches:
      - main
      - feature/**
      - fix/**
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      cucumber_tags:
        description: "Cucumber tag expression to run"
        required: false
        default: "@smoke"

permissions:
  contents: write   # required by peaceiris/actions-gh-pages to push to gh-pages branch

jobs:
  cucumber-smoke:
    name: Cucumber smoke suite
    runs-on: ubuntu-latest
    env:
      HEADLESS: "true"
      CUCUMBER_TAGS: ${{ github.event.inputs.cucumber_tags || '@smoke' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore previous Allure history
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install Playwright browser
        run: mvn -B -q exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps chromium"

      - name: Run Cucumber tests
        run: mvn -B -Dheadless=true -Dtest=CucumberRunner "-Dcucumber.filter.tags=${CUCUMBER_TAGS}" test

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline --save-dev

      - name: Add Allure metadata (environment, categories, executor, history)
        if: always()
        run: |
          mkdir -p target/allure-results

          # Environment + Categories widgets
          cp src/test/resources/allure/environment.properties target/allure-results/
          cp src/test/resources/allure/categories.json target/allure-results/

          # Executors widget
          cat > target/allure-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "reportName": "Dulux E2E Smoke Suite",
            "buildName": "GH Run #${{ github.run_number }}",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

          # Trend widget: carry over history from the previously published report
          if [ -d gh-pages/history ]; then
            mkdir -p target/allure-results/history
            cp -r gh-pages/history/. target/allure-results/history/
          fi

      - name: Generate Allure HTML report
        if: always()
        run: allure generate target/allure-results --clean -o target/allure-report

      - name: Upload Cucumber reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports
          path: |
            target/cucumber-reports
            target/surefire-reports

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      - name: Deploy Allure report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/allure-report
          publish_branch: gh-pages
          commit_message: "ci: publish Allure report [skip ci]"
